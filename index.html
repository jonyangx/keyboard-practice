<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>键盘跑酷 — Keyboard Runner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%); font-family: -apple-system, system-ui, 'Segoe UI', sans-serif; color: #e0e0e0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

  /* HUD */
  .hud { display: flex; justify-content: space-between; align-items: center; padding: 8px 20px; background: #16213e; border-bottom: 1px solid #0f3460; min-height: 44px; }
  .hud-score { font-size: 20px; font-weight: 900; color: #00d2ff; background: linear-gradient(135deg, rgba(0,210,255,0.15), rgba(0,210,255,0.05)); padding: 4px 12px; border-radius: 6px; text-shadow: 0 0 12px rgba(0,210,255,0.6); border: 1px solid rgba(0,210,255,0.3); }
  .hud-lesson { font-size: 13px; color: #a0a0c0; background: rgba(83,215,105,0.1); padding: 4px 10px; border-radius: 4px; border: 1px solid rgba(83,215,105,0.2); }
  .hud-lesson span { color: #53d769; font-weight: 600; }
  .hud-actions { display: flex; gap: 8px; }
  .hud-btn { padding: 6px 14px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: transform 0.1s, opacity 0.1s; }
  .hud-btn:hover { transform: scale(1.05); }
  .hud-btn:active { transform: scale(0.95); }
  .hud-btn-pause { background: #ffd93d; color: #1a1a2e; }
  .hud-btn-exit { background: #ff6b6b; color: #fff; }
.hud-combo { font-size: 22px; font-weight: 900; color: #ff6b6b; text-shadow: 0 0 15px rgba(255,107,107,0.7); background: linear-gradient(135deg, rgba(255,107,107,0.15), rgba(255,107,107,0.05)); padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(255,107,107,0.3); transition: transform 0.15s, text-shadow 0.15s; }
.hud-combo.inactive { opacity: 0.3; }
.hud-combo.pop { transform: scale(1.3); text-shadow: 0 0 25px rgba(255,107,107,1); }
.hud-speed { font-size: 13px; font-weight: 700; color: #ffd93d; margin-left: 12px; background: rgba(255,217,61,0.1); padding: 3px 8px; border-radius: 4px; border: 1px solid rgba(255,217,61,0.2); }

  /* Canvas */
  .canvas-wrap { flex: 1; position: relative; min-height: 200px; background: radial-gradient(ellipse at center, rgba(0,210,255,0.03) 0%, transparent 70%); }
  .canvas-wrap canvas { display: block; width: 100%; height: 100%; }
  
  /* Particle container */
  .particles { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
  .particle { position: absolute; border-radius: 50%; pointer-events: none; animation: particleFly 0.6s ease-out forwards; }
  @keyframes particleFly { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(0) translateY(-50px); } }
  @keyframes rippleExpand { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; border-width: 4px; } 100% { transform: translate(-50%, -50%) scale(3); opacity: 0; border-width: 1px; } }
  
  /* Screen shake */
  .shake { animation: screenShake 0.3s ease-out; }
  @keyframes screenShake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-8px) rotate(-0.5deg); } 40% { transform: translateX(8px) rotate(0.5deg); } 60% { transform: translateX(-4px) rotate(-0.3deg); } 80% { transform: translateX(4px) rotate(0.3deg); } }
  
  /* Combo text effect */
  .combo-text { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); font-size: 28px; font-weight: 900; pointer-events: none; opacity: 0; text-shadow: 0 0 20px currentColor; letter-spacing: 2px; }
  .combo-text.show { animation: comboTextPop 0.6s ease-out forwards; }
  @keyframes comboTextPop { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); } 20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); } 40% { transform: translate(-50%, -50%) scale(1); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(1) translateY(-30px); } }
  
  /* Background ambient particles */
  .ambient-particle { position: absolute; width: 4px; height: 4px; background: rgba(0,210,255,0.3); border-radius: 50%; animation: ambientFloat 8s infinite linear; }
  @keyframes ambientFloat { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 10% { opacity: 0.6; } 90% { opacity: 0.6; } 100% { transform: translateY(-100px) scale(1); opacity: 0; } }
  
  /* Audio visual feedback */
  .audio-bar { position: absolute; bottom: 0; width: 4px; background: linear-gradient(to top, #00d2ff, #4ecdc4); border-radius: 2px; animation: audioBarWave 0.2s ease-out forwards; }
  @keyframes audioBarWave { 0% { height: 0; opacity: 1; } 100% { height: 30px; opacity: 0; } }
  
  /* Streak fire effect */
  .streak-fire { position: absolute; font-size: 20px; animation: fireFlicker 0.3s infinite; pointer-events: none; }
  @keyframes fireFlicker { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.1); } }
  
  /* HUD shortcuts hint */
  .hud-shortcuts { font-size: 10px; color: #666; margin-left: 8px; }
  .hud-shortcuts kbd { background: rgba(255,255,255,0.1); padding: 1px 4px; border-radius: 3px; margin: 0 2px; font-family: inherit; }
  
  /* End screen medal */
  .medal { font-size: 60px; display: inline-block; animation: medalSpin 1s ease-out; filter: drop-shadow(0 0 20px currentColor); }
  @keyframes medalSpin { 0% { transform: scale(0) rotate(-180deg); opacity: 0; } 50% { transform: scale(1.2) rotate(10deg); } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }
  
  /* Progress bar */
  .progress-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.1); }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #00d2ff, #4ecdc4, #53d769); transition: width 0.3s; box-shadow: 0 0 10px #00d2ff; }

  /* Prompt - 更醒目的提示 */
  .prompt { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); font-size: 16px; font-weight: 700; color: #fff; background: linear-gradient(135deg, rgba(30,30,50,0.95), rgba(20,20,40,0.95)); padding: 10px 24px; border-radius: 14px; pointer-events: none; white-space: nowrap; border: 2px solid rgba(0,210,255,0.5); box-shadow: 0 6px 24px rgba(0,0,0,0.6), 0 0 20px rgba(0,210,255,0.2), inset 0 1px 0 rgba(255,255,255,0.1); animation: promptEnter 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .prompt .key-char { font-size: 26px; font-weight: 900; margin: 0 6px; color: #00d2ff; text-shadow: 0 0 10px rgba(0,210,255,0.8); }
  .prompt .finger-name { font-size: 13px; font-weight: 500; opacity: 0.9; color: #a0a0c0; }
  @keyframes promptEnter { 0% { opacity: 0; transform: translateX(-50%) translateY(-10px) scale(0.9); } 100% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); } }

  /* On-screen keyboard - 3D效果 */
  .keyboard { padding: 10px 12px 12px; background: linear-gradient(180deg, #1a2744 0%, #16213e 100%); display: flex !important; flex-direction: column; gap: 5px; align-items: center; min-height: 120px; border-top: 1px solid #0f3460; visibility: visible; box-shadow: 0 -4px 20px rgba(0,0,0,0.3); }
  .kb-row { display: flex; gap: 3px; }
  .key { width: 36px; height: 36px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: 'SF Mono', 'Courier New', monospace; font-size: 13px; font-weight: 700; border: 2px solid rgba(255,255,255,0.08); background: linear-gradient(180deg, rgba(60,70,100,0.6) 0%, rgba(40,50,80,0.8) 100%); color: #888; transition: transform 0.08s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.08s, border-color 0.08s; box-shadow: 0 4px 0 rgba(0,0,0,0.4), 0 6px 10px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1); }
  .key.lp { background: linear-gradient(180deg, rgba(255,107,107,0.25) 0%, rgba(255,107,107,0.15) 100%); color: #ff6b6b; border-color: rgba(255,107,107,0.4); box-shadow: 0 4px 0 rgba(255,107,107,0.3), 0 6px 10px rgba(0,0,0,0.3); }
  .key.lr { background: linear-gradient(180deg, rgba(255,160,107,0.25) 0%, rgba(255,160,107,0.15) 100%); color: #ffa06b; border-color: rgba(255,160,107,0.4); box-shadow: 0 4px 0 rgba(255,160,107,0.3), 0 6px 10px rgba(0,0,0,0.3); }
  .key.lm { background: linear-gradient(180deg, rgba(255,217,61,0.25) 0%, rgba(255,217,61,0.15) 100%); color: #ffd93d; border-color: rgba(255,217,61,0.4); box-shadow: 0 4px 0 rgba(255,217,61,0.3), 0 6px 10px rgba(0,0,0,0.3); }
  .key.li { background: linear-gradient(180deg, rgba(83,215,105,0.25) 0%, rgba(83,215,105,0.15) 100%); color: #53d769; border-color: rgba(83,215,105,0.4); box-shadow: 0 4px 0 rgba(83,215,105,0.3), 0 6px 10px rgba(0,0,0,0.3); }
  .key.ri { background: linear-gradient(180deg, rgba(78,205,196,0.25) 0%, rgba(78,205,196,0.15) 100%); color: #4ecdc4; border-color: rgba(78,205,196,0.4); box-shadow: 0 4px 0 rgba(78,205,196,0.3), 0 6px 10px rgba(0,0,0,0.3); }
  .key.rm { background: linear-gradient(180deg, rgba(69,183,209,0.25) 0%, rgba(69,183,209,0.15) 100%); color: #45b7d1; border-color: rgba(69,183,209,0.4); box-shadow: 0 4px 0 rgba(69,183,209,0.3), 0 6px 10px rgba(0,0,0,0.3); }
  .key.rr { background: linear-gradient(180deg, rgba(155,89,182,0.25) 0%, rgba(155,89,182,0.15) 100%); color: #9b59b6; border-color: rgba(155,89,182,0.4); box-shadow: 0 4px 0 rgba(155,89,182,0.3), 0 6px 10px rgba(0,0,0,0.3); }
  .key.rp { background: linear-gradient(180deg, rgba(232,67,147,0.25) 0%, rgba(232,67,147,0.15) 100%); color: #e84393; border-color: rgba(232,67,147,0.4); box-shadow: 0 4px 0 rgba(232,67,147,0.3), 0 6px 10px rgba(0,0,0,0.3); }
  .key.space { width: 180px; }
  .key.active { transform: scale(1.25) translateY(-2px); box-shadow: 0 0 24px currentColor, 0 0 40px currentColor, 0 8px 20px currentColor, inset 0 0 12px rgba(255,255,255,0.3); border-color: currentColor; background: linear-gradient(180deg, rgba(255,255,255,0.25) 0%, rgba(255,255,255,0.1) 100%); animation: keyFlash 0.15s ease-out; }
  @keyframes keyFlash { 0% { transform: scale(1.35) translateY(-4px); } 100% { transform: scale(1.25) translateY(-2px); } }
  .key.dimmed { opacity: 0.25; }

  /* Overlay screens - 增强过渡动画 */
  .overlay { position: absolute; inset: 0; background: rgba(10,10,30,0.92); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; opacity: 1; transition: opacity 0.3s ease, transform 0.3s ease; transform: scale(1); }
  .overlay.hidden { opacity: 0; transform: scale(0.95); pointer-events: none; }
  .overlay h1 { font-size: 32px; margin-bottom: 8px; color: #00d2ff; text-shadow: 0 0 20px rgba(0,210,255,0.5); letter-spacing: 1px; }
  .overlay h2 { font-size: 18px; margin-bottom: 20px; color: #a0a0c0; font-weight: 400; }
  .overlay .stats { display: flex; gap: 24px; margin-bottom: 24px; flex-wrap: wrap; justify-content: center; }
  .overlay .stat { text-align: center; background: rgba(255,255,255,0.05); padding: 12px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.08); min-width: 80px; }
  .overlay .stat-value { font-size: 32px; font-weight: 900; background: linear-gradient(135deg, #00d2ff, #4ecdc4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .overlay .stat-label { font-size: 11px; color: #a0a0c0; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .overlay .finger-bars { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 24px; }
  .overlay .finger-bar { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .overlay .finger-bar-fill { width: 32px; border-radius: 4px 4px 0 0; transition: height 0.5s; box-shadow: 0 -2px 10px currentColor; }
  .overlay .finger-bar-label { font-size: 10px; color: #a0a0c0; font-weight: 600; }
  .btn { padding: 14px 36px; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s, background 0.15s; }
  .btn:hover { transform: scale(1.08); }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: linear-gradient(135deg, #00d2ff, #00a8cc); color: #1a1a2e; box-shadow: 0 4px 20px rgba(0,210,255,0.4); }
  .btn-primary:hover { box-shadow: 0 6px 30px rgba(0,210,255,0.6); }
  .start-hint { font-size: 13px; color: #a0a0c0; margin-top: 16px; }
  .start-hint kbd { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 3px; font-family: 'Courier New', monospace; }
</style>
</head>
<body>

<!-- HUD -->
<div class="hud">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="hud-score" id="score">SCORE: 0</div>
  <div class="hud-lesson" id="hudLesson">WORLD: <span>基准键 Home Row</span></div>
  <div class="hud-actions">
    <button class="hud-btn" id="btnMusic" onclick="toggleMusic()" style="background:#4ecdc4;color:#fff;">🎵</button>
    <button class="hud-btn hud-btn-pause" id="btnPause" onclick="togglePause()">暂停</button>
    <button class="hud-btn hud-btn-exit" onclick="exitToMenu()">退出</button>
    <div class="hud-combo inactive" id="combo">x0</div>
    <div class="hud-speed" id="speedIndicator">1.0x</div>
    <span class="hud-shortcuts"><kbd>Esc</kbd>暂停 <kbd>Tab</kbd>音乐</span>
  </div>
</div>

<!-- Game Canvas -->
<div class="canvas-wrap">
  <canvas id="game"></canvas>
  <div class="particles" id="particles"></div>
  <div class="combo-text" id="comboText"></div>
  <div class="prompt" id="prompt"></div>

  <!-- Pause Screen -->
  <div class="overlay hidden" id="pauseScreen">
    <h1>暂停 Paused</h1>
    <div style="display:flex; gap:12px; margin-top:24px;">
      <button class="btn btn-primary" onclick="resumeGame()">继续 Resume</button>
      <button class="btn btn-primary" onclick="showMenu()" style="background:#9b59b6;">选关 Menu</button>
    </div>
    <div class="start-hint">按 <kbd>Esc</kbd> 继续</div>
  </div>

  <!-- Mode Selection Screen -->
  <div class="overlay" id="modeScreen">
    <h1>键盘跑酷</h1>
    <h2>Keyboard Runner</h2>
    <p style="color:#a0a0c0; margin-bottom:24px; font-size:13px; text-align:center; max-width:400px; line-height:1.5;">
      选择练习模式<br>Choose Your Practice Mode
    </p>
    <div style="display:flex; flex-direction:column; gap:12px; width:340px;">
      <button class="btn btn-primary" onclick="selectMode('key')" style="background:linear-gradient(135deg,#00d2ff,#00a8cc);">
        ⌨️ 键位模式 Key Mode<br><span style="font-size:12px;font-weight:400;opacity:0.8;">练习指法 · 提升速度</span>
      </button>
      <button class="btn btn-primary" onclick="selectMode('word')" style="background:linear-gradient(135deg,#ff6b6b,#e84393);">
        📖 单词模式 Word Mode<br><span style="font-size:12px;font-weight:400;opacity:0.8;">边打字 · 边记单词</span>
      </button>
    </div>
  </div>

  <!-- Word Category Selection -->
  <div class="overlay hidden" id="wordCategoryScreen">
    <h1>单词模式</h1>
    <h2>Word Practice</h2>
    <p style="color:#a0a0c0; margin-bottom:16px; font-size:13px; text-align:center; max-width:400px; line-height:1.5;">
      选择单词组别<br>Choose Word Category
    </p>
    <div id="wordCategorySelect" style="display:flex; flex-direction:column; gap:8px; max-height:260px; overflow-y:auto; width:340px;"></div>
    <div class="start-hint">按 <kbd>Esc</kbd> 返回</div>
  </div>

  <!-- Start Screen -->
  <div class="overlay hidden" id="startScreen">
    <h1>键位模式</h1>
    <h2>Keyboard Runner</h2>
    <p style="color:#a0a0c0; margin-bottom:16px; font-size:13px; text-align:center; max-width:400px; line-height:1.5;">
      用正确的手指按下对应的键，跳过障碍<br>
      准确率 ≥ 60% 解锁下一关
    </p>
    <div id="levelSelect" style="display:flex; flex-direction:column; gap:8px; margin-bottom:16px; max-height:260px; overflow-y:auto; width:340px;"></div>
    <div class="start-hint">按数字键 <kbd>1</kbd>-<kbd>6</kbd> 快速选择</div>
  </div>

  <!-- End Screen -->
  <div class="overlay hidden" id="endScreen">
    <div class="medal" id="medal" style="display:none;">🥇</div>
    <h1 id="endTitle">运行结束 Run Complete</h1>
    <div class="stats" id="endStats"></div>
    <div class="finger-bars" id="fingerBars"></div>
    <div style="display:flex; gap:12px; margin-top:8px;">
      <button class="btn btn-primary" id="btnRetry" onclick="startGame()">再来一次 Retry</button>
      <button class="btn btn-primary" id="btnNext" onclick="goNextLevel()" style="background:#53d769;display:none;">下一关 Next</button>
      <button class="btn btn-primary" id="btnMenu" onclick="showMenu()" style="background:#9b59b6;">选关 Menu</button>
    </div>
    <div class="start-hint">or press <kbd>Space</kbd></div>
  </div>
</div>

<!-- On-screen Keyboard -->
<div class="keyboard" id="keyboard"></div>

<script>
// ═══════════════════════════════════════════
// DATA: Finger zones, key mappings, lessons

const FINGER_ZONES = {
  lp: { name: '左小指 L-Pinky',  keys: ['a','q','z','1'], color: '#ff6b6b' },
  lr: { name: '左无名指 L-Ring',  keys: ['s','w','x','2'], color: '#ffa06b' },
  lm: { name: '左中指 L-Mid',    keys: ['d','e','c','3'], color: '#ffd93d' },
  li: { name: '左食指 L-Index',  keys: ['f','r','v','4','5','g','t','b'], color: '#53d769' },
  ri: { name: '右食指 R-Index',  keys: ['h','y','n','6','7','j','u','m'], color: '#4ecdc4' },
  rm: { name: '右中指 R-Mid',    keys: ['k','i',',','8'], color: '#45b7d1' },
  rr: { name: '右无名指 R-Ring',  keys: ['l','o','.','9'], color: '#9b59b6' },
  rp: { name: '右小指 R-Pinky',  keys: [';','p','/','0'], color: '#e84393' },

// Build reverse map: key → { zone, color, name }
const KEY_MAP = {};
for (const [zone, data] of Object.entries(FINGER_ZONES)) {

}

// Progress persistence
function loadProgress() {
  try {
    const data = JSON.parse(localStorage.getItem('kb-runner-progress') || '{}');
    return { unlocked: data.unlocked || 1, bestAccuracy: data.bestAccuracy || {} };
  } catch { return { unlocked: 1, bestAccuracy: {} }; }
}
function saveProgress(progress) {
  try { localStorage.setItem('kb-runner-progress', JSON.stringify(progress)); } catch {}
}
function unlockNext(lessonIndex, accuracy) {
  const progress = loadProgress();
  progress.bestAccuracy[lessonIndex] = Math.max(accuracy, progress.bestAccuracy[lessonIndex] || 0);
  if (accuracy >= 60 && lessonIndex + 2 > progress.unlocked) {
    progress.unlocked = Math.min(lessonIndex + 2, LESSONS.length);
  }
  saveProgress(progress);
}

const MELODY = [
  { note: 523, dur: 0.3 }, // C5
  { note: 587, dur: 0.3 }, // D5
  { note: 659, dur: 0.3 }, // E5
  { note: 523, dur: 0.3 }, // C5

  { note: 784, dur: 0.3 }, // G5

  { note: 784, dur: 0.3 }, // G5
  { note: 659, dur: 0.3 }, // E5
  { note: 784, dur: 0.3 }, // G5
  { note: 880, dur: 0.6 }, // A5
  { note: 0, dur: 0.2 },   // rest
];
let melodyIndex = 0;

function playBgNote(freq, duration) {
  if (!audioCtx || !bgMusicEnabled) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration * 0.9);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function startBgMusic() {
  if (bgMusicInterval) return;
  bgMusicEnabled = true;
  melodyIndex = 0;
  const playNext = () => {
    if (!bgMusicEnabled) return;
    const m = MELODY[melodyIndex];
    if (m.note > 0) playBgNote(m.note, m.dur);
    melodyIndex = (melodyIndex + 1) % MELODY.length;
    setTimeout(playNext, m.dur * 1000 * 0.9);
  };
  playNext();
}

function stopBgMusic() {
  bgMusicEnabled = false;
  if (bgMusicInterval) {
    clearTimeout(bgMusicInterval);
    bgMusicInterval = null;
  }
}

function playSound(type) {
  if (!audioEnabled || !audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  const now = audioCtx.currentTime;
  if (type === 'key') {
    osc.frequency.setValueAtTime(600, now);
    osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
    gain.gain.setValueAtTime(0.1, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
    osc.start(now);
    osc.stop(now + 0.1);
  } else if (type === 'jump') {
    osc.frequency.setValueAtTime(300, now);
    osc.frequency.exponentialRampToValueAtTime(600, now + 0.15);
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
    osc.start(now);
    osc.stop(now + 0.15);
  } else if (type === 'hit') {
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(150, now);
    osc.frequency.exponentialRampToValueAtTime(50, now + 0.2);
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
    osc.start(now);
    osc.stop(now + 0.2);
  } else if (type === 'combo') {
    osc.frequency.setValueAtTime(800, now);
    osc.frequency.setValueAtTime(1000, now + 0.05);
    gain.gain.setValueAtTime(0.08, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
    osc.start(now);
    osc.stop(now + 0.1);
  }
}

function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  for (const row of KB_ROWS) {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'kb-row';
    for (const key of row) {
      const keyDiv = document.createElement('div');
      const info = KEY_MAP[key];
      const isActive = currentLesson().keys.includes(key);
      keyDiv.className = 'key ' + (info ? info.zone : '') + (!isActive ? ' dimmed' : '');
      keyDiv.textContent = key === ';' ? ';' : key.toUpperCase();
      keyDiv.id = 'key-' + key;
      rowDiv.appendChild(keyDiv);
    }
    kb.appendChild(rowDiv);
  }
  // Space bar
  const spaceRow = document.createElement('div');
  spaceRow.className = 'kb-row';
  const spaceKey = document.createElement('div');
  spaceKey.className = 'key space dimmed';
  spaceKey.textContent = 'SPACE';
  spaceRow.appendChild(spaceKey);
  kb.appendChild(spaceRow);
}

function highlightKey(key) {
  // Remove previous highlight
  if (activeKey) {
    const prev = document.getElementById('key-' + activeKey);
    if (prev) prev.classList.remove('active');
  }
  activeKey = key;
  activeKeyTimer = 15;
  const el = document.getElementById('key-' + key);
  if (el) el.classList.add('active');
}

function clearHighlight() {
  if (activeKey) {
    const el = document.getElementById('key-' + activeKey);
    if (el) el.classList.remove('active');
    activeKey = null;
  }
}

function spawnParticles(x, y, color, count) {

      p.className = 'particle';
      p.style.left = `${x}px`;

      p.style.boxShadow = `0 0 ${8 + Math.random() * 8}px ${color}`;
      p.style.animationDuration = `${0.4 + Math.random() * 0.3}s`;
      particleContainer.appendChild(p);
      setTimeout(() => p.remove(), 700);
    }
  }
}

// Hit ripple effect
function showHitRipple(x, y, color) {
  const ripple = document.createElement('div');
  ripple.style.cssText = `
    position: absolute;
    left: ${x}px;
    top: ${y}px;
    width: 20px;
    height: 20px;
    border: 3px solid ${color};
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    animation: rippleExpand 0.5s ease-out forwards;
  `;
  const container = document.querySelector('.canvas-wrap');
  if (container) {
    container.appendChild(ripple);
    setTimeout(() => ripple.remove(), 500);
  }
}

// Combo text effect
const COMBO_WORDS = {
  5: { text: 'NICE!', color: '#53d769' },
  10: { text: 'GREAT!', color: '#4ecdc4' },
  15: { text: 'AMAZING!', color: '#00d2ff' },
  20: { text: 'PERFECT!', color: '#ffd93d' },
  25: { text: 'LEGENDARY!', color: '#ff6b6b' },
  30: { text: 'GODLIKE!', color: '#e84393' },
};
function showComboText(combo) {
  const comboText = document.getElementById('comboText');
  if (!comboText) return;
  const threshold = Math.floor(combo / 5) * 5;
  const effect = COMBO_WORDS[threshold];
  if (!effect) return;
  comboText.textContent = effect.text;
  comboText.style.color = effect.color;
  comboText.style.textShadow = `0 0 20px ${effect.color}`;
  comboText.classList.remove('show');
  void comboText.offsetWidth;
  comboText.classList.add('show');
}

// Ambient background particles
function initAmbientParticles() {
  const container = document.querySelector('.canvas-wrap');
  if (!container) return;
  // Clear existing
  container.querySelectorAll('.ambient-particle').forEach(p => p.remove());
  for (let i = 0; i < 15; i++) {
    const p = document.createElement('div');
    p.className = 'ambient-particle';
    p.style.left = `${Math.random() * 100}%`;
    p.style.animationDelay = `${Math.random() * 8}s`;
    p.style.animationDuration = `${6 + Math.random() * 4}s`;
    p.style.opacity = 0.2 + Math.random() * 0.3;
    container.appendChild(p);
  }
}

// Audio visual bars on key press
function showAudioVisual() {
  const container = document.querySelector('.canvas-wrap');
  if (!container) return;
  for (let i = 0; i < 3; i++) {
    const bar = document.createElement('div');
    bar.className = 'audio-bar';
    bar.style.left = `${40 + Math.random() * 20}%`;
    bar.style.animationDuration = `${0.15 + Math.random() * 0.1}s`;
    container.appendChild(bar);
    setTimeout(() => bar.remove(), 250);
  }
}

// ═══════════════════════════════════════════
// INPUT HANDLING
// ═══════════════════════════════════════════

function handleInput(key) {
  if (state !== 'playing') return;
  initAudio();

  // Find the nearest uncleared obstacle
  const nextObs = obstacles.find(o => !o.cleared && o.x > runner.x - 20);
  if (!nextObs) return;

  highlightKey(key);

  if (key === nextObs.key) {
    // Correct key → jump
    nextObs.cleared = true;
    score++;
    const prevCombo = combo;
    combo++;
    if (combo > maxCombo) maxCombo = combo;
    fingerStats[nextObs.zone].hits++;
    runner.jumping = true;
    runner.vy = -8;
    spawnParticles(nextObs.x, groundY - 40, nextObs.color, 8);
    showHitRipple(nextObs.x, groundY - 30, nextObs.color);
    showAudioVisual();
    playSound('key');
    if (combo > prevCombo && combo % 5 === 0) {
      playSound('combo');
      showComboText(combo);
    }
    updateHUD();
    updatePrompt(nextObs);
  } else {
    // Wrong key → stumble
    combo = 0;
    fingerStats[nextObs.zone].misses++;
    runner.stumbling = true;
    runner.stumbleTimer = 12;
    spawnParticles(runner.x + 20, groundY - 20, '#ff4444', 4);
    showHitRipple(runner.x + 20, groundY - 20, '#ff4444');
    // Screen shake
    document.body.classList.add('shake');
    setTimeout(() => document.body.classList.remove('shake'), 300);
    playSound('hit');
    updateHUD();
  }
}

// Physical key code → logical key (IME-independent)
const CODE_TO_KEY = {
  'Semicolon': ';', 'Comma': ',', 'Period': '.', 'Slash': '/',
  'Digit1': '1', 'Digit2': '2', 'Digit3': '3', 'Digit4': '4', 'Digit5': '5',
  'Digit6': '6', 'Digit7': '7', 'Digit8': '8', 'Digit9': '9', 'Digit0': '0',
  'KeyA': 'a', 'KeyB': 'b', 'KeyC': 'c', 'KeyD': 'd', 'KeyE': 'e', 'KeyF': 'f',
  'KeyG': 'g', 'KeyH': 'h', 'KeyI': 'i', 'KeyJ': 'j', 'KeyK': 'k', 'KeyL': 'l',
  'KeyM': 'm', 'KeyN': 'n', 'KeyO': 'o', 'KeyP': 'p', 'KeyQ': 'q', 'KeyR': 'r',
  'KeyS': 's', 'KeyT': 't', 'KeyU': 'u', 'KeyV': 'v', 'KeyW': 'w', 'KeyX': 'x',
  'KeyY': 'y', 'KeyZ': 'z', 'Space': ' ',
};

function normalizeKey(e) {
  // Prefer physical key code (immune to IME/full-width input)
  if (CODE_TO_KEY[e.code]) return CODE_TO_KEY[e.code];
  // Fallback to e.key with full-width → half-width normalization
  let key = e.key.toLowerCase();
  key = key.replace(/；/g, ';').replace(/，/g, ',').replace(/。/g, '.').replace(/／/g, '/');
  return key;
}

document.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  const key = normalizeKey(e);

  if (key === 'Escape') {
    if (state === 'idle') {
      if (gameMode === 'word') {
        document.getElementById('wordCategoryScreen').classList.remove('hidden');
        document.getElementById('startScreen').classList.add('hidden');
        document.getElementById('modeScreen').classList.add('hidden');
        return;
      } else {
        document.getElementById('modeScreen').classList.remove('hidden');
        document.getElementById('startScreen').classList.add('hidden');
        return;
      }
    }
    if (state === 'playing' || state === 'paused') {
      togglePause();
    }
    return;
  }

  if (key === ' ') {
    e.preventDefault();
    if (state === 'idle') {
      if (gameMode === 'word') {
        const progress = loadProgress();
        currentLessonIndex = Math.min(progress.unlocked - 1, LESSONS.length - 1);
      }
      startGame();
    } else if (state === 'ended') {
      startGame();
    } else if (state === 'paused') {
      resumeGame();
    }
    return;
  }

  if (state === 'idle' && gameMode === 'key') {
    const num = parseInt(key);
    if (num >= 1 && num <= LESSONS.length) {
      const progress = loadProgress();
      if (num <= progress.unlocked) {
        currentLessonIndex = num - 1;
        startGame();
      }
    }
    return;
  }

  if (state === 'playing') {
    e.preventDefault();
    if (gameMode === 'word') {
      if (key === ' ' || key.length !== 1 || !/[a-z]/.test(key)) return;
      handleWordInput(key);
    } else {
      handleInput(key);
    }
  }
});

function selectMode(mode) {
  gameMode = mode;
  document.getElementById('modeScreen').classList.add('hidden');
  if (mode === 'key') {
    document.getElementById('startScreen').classList.remove('hidden');
    buildLevelSelect();
  } else {
    document.getElementById('wordCategoryScreen').classList.remove('hidden');
    buildWordCategorySelect();
  }
}

function buildWordCategorySelect() {
  const container = document.getElementById('wordCategorySelect');
  container.innerHTML = '';
  let i = 1;
  for (const [id, cat] of Object.entries(WORD_LISTS)) {
    const btn = document.createElement('button');
    btn.className = 'level-btn';
    btn.style.borderLeftColor = cat.color;
    btn.innerHTML = `<span class="level-num">${i}</span><span class="level-name">${cat.name}</span><span class="level-badge" style="color:${cat.color}">${cat.words.length}词</span>`;
    btn.onclick = () => selectWordCategory(id);
    container.appendChild(btn);
    i++;
  }
}

function selectWordCategory(categoryId) {
  currentWordCategory = categoryId;
  document.getElementById('wordCategoryScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
  const cat = WORD_LISTS[categoryId];
  document.querySelector('#startScreen h1').textContent = '单词模式';
  document.querySelector('#startScreen h2').textContent = cat.name;
  document.querySelector('#startScreen p').innerHTML = `边打字边记单词<br>共 ${cat.words.length} 个单词`;
  buildWordLevelSelect();
}

function buildWordLevelSelect() {
  const container = document.getElementById('levelSelect');
  container.innerHTML = '';
  const cat = WORD_LISTS[currentWordCategory];
  const levels = [
    { id: 'easy', name: '初级 Easy', count: Math.min(20, cat.words.length), bg: cat.color },
    { id: 'medium', name: '中级 Medium', count: Math.min(40, cat.words.length), bg: cat.color },
    { id: 'hard', name: '高级 Hard', count: cat.words.length, bg: cat.color }
  ];
  levels.forEach((level, idx) => {
    if (level.count <= 0) return;
    const btn = document.createElement('button');
    btn.className = 'level-btn';
    btn.style.borderLeftColor = level.bg;
    btn.innerHTML = `<span class="level-num">${idx + 1}</span><span class="level-name">${level.name}</span><span class="level-badge" style="color:${level.bg}">${level.count}词</span>`;
    btn.onclick = () => startWordGame(level.id);
    container.appendChild(btn);
  });
}

let wordGameConfig = { difficulty: 'easy', words: [] };

function startWordGame(difficulty) {
  const cat = WORD_LISTS[currentWordCategory];
  let wordCount = difficulty === 'easy' ? 20 : difficulty === 'medium' ? 40 : cat.words.length;
  wordCount = Math.min(wordCount, cat.words.length);
  wordGameConfig.difficulty = difficulty;
  wordGameConfig.words = shuffleArray([...cat.words]).slice(0, wordCount);
  wordGameConfig.currentIndex = 0;
  document.getElementById('startScreen').classList.add('hidden');
  startWordMode();
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startWordMode() {
  DOM.startScreen.classList.add('hidden');
  DOM.endScreen.classList.add('hidden');
  document.getElementById('pauseScreen').classList.add('hidden');
  score = 0; combo = 0; maxCombo = 0;
  timeLeft = 60;
  obstacles = [];
  nextObstacleIn = 80;
  speedMultiplier = 1;
  typedText = '';
  currentWordIndex = 0;
  initCanvas();
  buildKeyboard();
  initAmbientParticles();
  state = 'playing';
  updateHUD();
  const cat = WORD_LISTS[currentWordCategory];
  DOM.hudLesson.querySelector('span').textContent = cat.name;
  DOM.prompt.textContent = '';
  nextWordObstacle();
  if (musicOn) startBgMusic();
}

function nextWordObstacle() {
  if (wordGameConfig.currentIndex >= wordGameConfig.words.length) {
    endGame();
    return;
  }
  currentWord = wordGameConfig.words[wordGameConfig.currentIndex];
  typedText = '';
  spawnWordObstacle();
}

function spawnWordObstacle() {
  const cat = WORD_LISTS[currentWordCategory];
  obstacles.push({
    x: canvas.width + 40,
    type: 'word',
    word: currentWord,
    typed: 0,
    color: cat.color,
    width: 60 + currentWord.length * 12,
    height: 40,
    cleared: false
  });
}

function handleWordInput(key) {
  if (!currentWord || state !== 'playing') return;
  const expected = currentWord[typedText.length];
  if (key === expected) {
    typedText += key;
    const obs = obstacles.find(o => o.type === 'word' && o.word === currentWord && !o.cleared);
    if (obs) obs.typed = typedText.length;
    const prevCombo = combo;
    combo++;
    if (combo > maxCombo) maxCombo = combo;
    score += 10 * (1 + Math.floor(combo / 10) * 0.5);
    spawnParticles(runner.x + 30, groundY - 30, obstacles[0]?.color || '#00d2ff', 6);
    playSound('key');
    if (combo % 10 === 0) showComboText(combo);
    updateHUD();
    if (typedText === currentWord) {
      obs.cleared = true;
      combo++;
      if (combo > maxCombo) maxCombo = combo;
      score += 50;
      spawnParticles(obs.x + 50, groundY - 50, cat.color, 15);
      showComboText(combo);
      playSound('combo');
      wordGameConfig.currentIndex++;
      setTimeout(() => nextWordObstacle(), 300);
    }
    updateWordPrompt();
  } else {
    combo = 0;
    runner.stumbling = true;
    runner.stumbleTimer = 12;
    spawnParticles(runner.x + 20, groundY - 20, '#ff4444', 4);
    document.body.classList.add('shake');
    setTimeout(() => document.body.classList.remove('shake'), 300);
    playSound('hit');
    updateHUD();
  }
}

function updateWordPrompt() {
  const prompt = document.getElementById('prompt');
  const cat = WORD_LISTS[currentWordCategory];
  const remaining = currentWord.slice(typedText.length);
  const typed = `<span style="color:#888;text-decoration:line-through">${typedText}</span>`;
  const next = `<span style="color:${cat.color};font-weight:bold">${remaining}</span>`;
  prompt.innerHTML = `${typed}${next}<span class="finger-name">(${wordGameConfig.currentIndex + 1}/${wordGameConfig.words.length})</span>`;
  prompt.style.borderColor = cat.color;
  prompt.style.boxShadow = `0 4px 20px rgba(0,0,0,0.5), 0 0 20px ${cat.color}40`;
  prompt.style.color = cat.color;
}

// ═══════════════════════════════════════════
// HUD
// ═══════════════════════════════════════════

function updateHUD() {
  DOM.score.textContent = `SCORE: ${score}`;
  const prevCombo = parseInt(DOM.combo.textContent.replace('x','') || '0');
  DOM.combo.textContent = `x${combo}`;
  DOM.combo.classList.toggle('inactive', combo === 0);
  // Combo pop animation when increasing
  if (combo > prevCombo && combo > 0) {
    DOM.combo.classList.remove('pop');
    void DOM.combo.offsetWidth; // Force reflow
    DOM.combo.classList.add('pop');
    setTimeout(() => DOM.combo.classList.remove('pop'), 150);
  }
  if (DOM.speedIndicator) {
    DOM.speedIndicator.textContent = `${speedMultiplier.toFixed(1)}x`;
  }
}

function updatePrompt(obs) {
  const prompt = document.getElementById('prompt');
  const info = KEY_MAP[obs.key];
  const keyUpper = obs.key.toUpperCase();
  prompt.innerHTML = `<span class="key-char">${keyUpper}</span><span class="finger-name">${info.name.split(' ')[0]}</span>`;
  prompt.style.borderColor = info.color;
  prompt.style.boxShadow = `0 4px 20px rgba(0,0,0,0.5), 0 0 20px ${info.color}40`;
  prompt.style.color = info.color;
}

function showNextPrompt() {
  const nextObs = obstacles.find(o => !o.cleared && o.x > runner.x - 20);
  if (nextObs && nextObs.key) {
    updatePrompt(nextObs);
  } else {
    DOM.prompt.textContent = '';
  }
}

// ═══════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════

function drawBackground() {
  const lesson = currentLesson();
  const lessonId = lesson.id;

  // Cache gradient - only recreate when lesson changes
  if (!cachedGradient || lastLessonId !== lessonId) {
    cachedGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
    cachedGradient.addColorStop(0, '#0a0a23');
    cachedGradient.addColorStop(0.5, '#1a1a3e');
    cachedGradient.addColorStop(0.78, lesson.bg1);
    cachedGradient.addColorStop(1, lesson.bg2);
    lastLessonId = lessonId;
  }

  ctx.fillStyle = cachedGradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Stars
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  for (let i = 0; i < 30; i++) {
    const sx = (i * 137.5 + scrollOffset * 0.1) % canvas.width;
    const sy = (i * 73.3) % (groundY - 40);
    ctx.fillRect(sx, sy, 1.5, 1.5);
  }

  // Ground
  ctx.fillStyle = lesson.bg1;
  ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
  ctx.fillStyle = lesson.ground;
  ctx.globalAlpha = 0.4;
  ctx.fillRect(0, groundY, canvas.width, 2);
  ctx.globalAlpha = 1;

  // Ground texture lines
  ctx.strokeStyle = lesson.ground + '26';
  ctx.lineWidth = 1;
  for (let i = 0; i < 20; i++) {
    const gx = ((i * 80 - scrollOffset * 0.8) % (canvas.width + 80) + canvas.width + 80) % (canvas.width + 80) - 40;
    ctx.beginPath();
    ctx.moveTo(gx, groundY + 8);
    ctx.lineTo(gx + 30, groundY + 8);
    ctx.stroke();
  }
}

function drawRunner() {
  const r = runner;
  const baseY = r.jumping ? r.y : groundY;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(r.x + 15, groundY + 4, 16, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Stumble shake
  let shakeX = 0, shakeR = 0;
  if (r.stumbling) {
    shakeX = Math.sin(r.stumbleTimer * 2) * 4;
    shakeR = Math.sin(r.stumbleTimer * 3) * 0.1;
  }

  const cx = r.x + 15 + shakeX;
  const bodyColor = r.stumbling ? '#ff4444' : '#4ecdc4';

  ctx.save();
  ctx.translate(cx, baseY);
  ctx.rotate(shakeR);

  // Legs (behind body) - running animation
  const legPhase = r.jumping ? -0.3 : scrollOffset * 0.15;
  ctx.strokeStyle = bodyColor;
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  // Left leg
  ctx.beginPath();
  ctx.moveTo(-5, -16);
  ctx.lineTo(-7 + Math.sin(legPhase) * 6, -1);
  ctx.stroke();
  // Right leg
  ctx.beginPath();
  ctx.moveTo(5, -16);
  ctx.lineTo(7 - Math.sin(legPhase) * 6, -1);
  ctx.stroke();
  // Shoes
  ctx.fillStyle = '#ffd93d';
  ctx.beginPath();
  ctx.ellipse(-7 + Math.sin(legPhase) * 6, -1, 5, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(7 - Math.sin(legPhase) * 6, -1, 5, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body (rounded rectangle)
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.roundRect(-10, -42, 20, 28, 6);
  ctx.fill();
  // Body highlight
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath();
  ctx.roundRect(-7, -40, 8, 24, 4);
  ctx.fill();

  // Arms
  ctx.strokeStyle = bodyColor;
  ctx.lineWidth = 4;
  const armPhase = r.jumping ? -1.2 : scrollOffset * 0.15 + Math.PI;
  // Left arm
  ctx.beginPath();
  ctx.moveTo(-9, -34);
  ctx.lineTo(-14 + Math.sin(armPhase) * 4, -22);
  ctx.stroke();
  // Right arm
  ctx.beginPath();
  ctx.moveTo(9, -34);
  ctx.lineTo(14 - Math.sin(armPhase) * 4, -22);
  ctx.stroke();
  // Hands (circles)
  ctx.fillStyle = '#ffd93d';
  ctx.beginPath();
  ctx.arc(-14 + Math.sin(armPhase) * 4, -22, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(14 - Math.sin(armPhase) * 4, -22, 3, 0, Math.PI * 2);
  ctx.fill();

  // Head (larger, more cartoon)
  ctx.fillStyle = '#ffd93d';
  ctx.beginPath();
  ctx.arc(0, -54, 14, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#e6c235';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Hair tuft
  ctx.strokeStyle = '#e6c235';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(-2, -67);
  ctx.quadraticCurveTo(2, -73, 6, -68);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(2, -67);
  ctx.quadraticCurveTo(0, -75, -4, -70);
  ctx.stroke();

  // Eyes (cartoon style with whites)
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(-5, -56, 4.5, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(5, -56, 4.5, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  // Pupils
  ctx.fillStyle = '#333';
  const pupilOff = r.stumbling ? 0 : 1;
  ctx.beginPath();
  ctx.arc(-4 + pupilOff, -55, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(6 + pupilOff, -55, 2.5, 0, Math.PI * 2);
  ctx.fill();
  // Eye shine
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(-3 + pupilOff, -56.5, 1, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(7 + pupilOff, -56.5, 1, 0, Math.PI * 2);
  ctx.fill();

  // Mouth
  if (r.stumbling) {
    // X mouth when stumbling
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-3, -48);
    ctx.lineTo(3, -46);
    ctx.moveTo(3, -48);
    ctx.lineTo(-3, -46);
    ctx.stroke();
  } else if (r.jumping) {
    // Open mouth when jumping
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.ellipse(0, -47, 3, 2.5, 0, 0, Math.PI * 2);
    ctx.fill();
  } else {
    // Smile
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, -49, 4, 0.2, Math.PI - 0.2);
    ctx.stroke();
  }

  // Cheek blush
  ctx.fillStyle = 'rgba(255,107,107,0.3)';
  ctx.beginPath();
  ctx.ellipse(-10, -50, 3, 2, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(10, -50, 3, 2, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawObstacles() {
  for (const obs of obstacles) {
    if (obs.x < -60 || obs.cleared) continue;

    if (obs.type === 'word') {
      const boxY = groundY - 60;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.strokeStyle = obs.color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.roundRect(obs.x, boxY, obs.width, 36, 8);
      ctx.fill();
      ctx.stroke();
      const typed = obs.word.substring(0, obs.typed);
      const remaining = obs.word.substring(obs.typed);
      ctx.font = 'bold 16px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      if (typed) {
        ctx.fillStyle = '#888';
        ctx.fillText(typed, obs.x + obs.width / 2 - ctx.measureText(remaining).width / 2, boxY + 18);
      }
      ctx.fillStyle = obs.color;
      ctx.fillText(remaining, obs.x + obs.width / 2 + ctx.measureText(typed).width / 2, boxY + 18);
      ctx.textAlign = 'start';
    } else {
      const info = KEY_MAP[obs.key];
      ctx.fillStyle = '#555';
      ctx.fillRect(obs.x + 22, groundY - 50, 6, 50);
      const boxY = groundY - 80;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.strokeStyle = info.color;
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 3]);
      ctx.beginPath();
      ctx.roundRect(obs.x, boxY, 50, 30, 6);
      ctx.fill();
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = info.color;
      ctx.font = 'bold 20px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(obs.key === ';' ? ';' : obs.key.toUpperCase(), obs.x + 25, boxY + 15);
      ctx.globalAlpha = 0.6;
      ctx.font = '9px -apple-system, system-ui, sans-serif';
      ctx.fillText(info.name.split(' ')[0], obs.x + 25, boxY + 38);
      ctx.globalAlpha = 1;
    }
  }
  ctx.textAlign = 'start';
}

function drawParticles() {
  for (const p of particles) {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life / 35;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function drawTimeBar() {
  const pct = timeLeft / currentLesson().duration;
  const barW = canvas.width * pct;
  ctx.fillStyle = pct > 0.3 ? '#00d2ff' : '#ff6b6b';
  ctx.fillRect(0, 0, barW, 3);
}

// ═══════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════

function update(dt) {
  if (state !== 'playing') return;

  timeLeft -= dt;
  if (timeLeft <= 0) {
    timeLeft = 0;
    endGame();
    return;
  }

  const effectiveSpeed = gameMode === 'word'
    ? 2.5
    : (() => {
        const lesson = currentLesson();
        const progress = 1 - (timeLeft / lesson.duration);
        speedMultiplier = 1 + (progress * 0.5);
        return lesson.speed * speedMultiplier;
      })();

  const progressFill = document.getElementById('progressFill');
  if (gameMode === 'key') {
    const lesson = currentLesson();
    const progress = 1 - (timeLeft / lesson.duration);
    if (progressFill) progressFill.style.width = `${progress * 100}%`;
  } else {
    const totalTime = 60;
    const progress = 1 - (timeLeft / totalTime);
    if (progressFill) progressFill.style.width = `${progress * 100}%`;
  }

  scrollOffset += effectiveSpeed;

  if (runner.jumping) {
    runner.vy += 0.4;
    runner.y += runner.vy;
    if (runner.y >= groundY) {
      runner.y = groundY;
      runner.jumping = false;
      runner.vy = 0;
    }
  }
  if (runner.stumbling) {
    runner.stumbleTimer--;
    if (runner.stumbleTimer <= 0) runner.stumbling = false;
  }

  if (gameMode === 'key') {
    nextObstacleIn -= speedMultiplier;
    if (nextObstacleIn <= 0) spawnObstacle();
    for (const obs of obstacles) {
      obs.x -= effectiveSpeed;
    }
    for (const obs of obstacles) {
      if (!obs.cleared && obs.x < runner.x - 30) {
        obs.cleared = true;
        fingerStats[obs.zone].misses++;
        combo = 0;
        updateHUD();
      }
    }
    showNextPrompt();
  } else {
    for (const obs of obstacles) {
      obs.x -= effectiveSpeed;
    }
    if (obstacles.length === 0 || (obstacles[0] && obstacles[0].cleared)) {
      nextObstacleIn -= speedMultiplier;
      if (nextObstacleIn <= 0) {
        nextWordObstacle();
        nextObstacleIn = 30;
      }
    }
    if (obstacles.length > 0 && obstacles[0] && !obstacles[0].cleared && obstacles[0].x < runner.x - 50) {
      obstacles[0].cleared = true;
      combo = 0;
      updateHUD();
    }
  }

  obstacles = obstacles.filter(o => o.x > -100);

  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life--;
  }
  particles = particles.filter(p => p.life > 0);

  if (activeKeyTimer > 0) {
    activeKeyTimer--;
    if (activeKeyTimer <= 0) clearHighlight();
  }
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground();
  drawObstacles();
  drawRunner();
  drawParticles();
  drawTimeBar();
}

function gameLoop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  update(dt);
  render();

  requestAnimationFrame(gameLoop);
}

// ═══════════════════════════════════════════
// GAME FLOW
// ═══════════════════════════════════════════

function startGame() {
  DOM.startScreen.classList.add('hidden');
  DOM.endScreen.classList.add('hidden');
  document.getElementById('pauseScreen').classList.add('hidden');
  resetState();
  initCanvas();
  buildKeyboard();
  initAmbientParticles();
  state = 'playing';
  updateHUD();
  DOM.hudLesson.querySelector('span').textContent = currentLesson().name;
  DOM.prompt.textContent = '';
  if (musicOn) startBgMusic();
}

function resumeGame() {
  document.getElementById('pauseScreen').classList.add('hidden');
  state = 'playing';
}

function togglePause() {
  if (state === 'playing') {
    state = 'paused';
    document.getElementById('pauseScreen').classList.remove('hidden');
    stopBgMusic();
  } else if (state === 'paused') {
    resumeGame();
    if (bgMusicEnabled) startBgMusic();
  }
}

let musicOn = false;
function toggleMusic() {
  musicOn = !musicOn;
  const btn = document.getElementById('btnMusic');
  btn.textContent = musicOn ? '🎶' : '🎵';
  btn.style.background = musicOn ? '#53d769' : '#4ecdc4';
  if (musicOn && state === 'playing') {
    startBgMusic();
  } else {
    stopBgMusic();
  }
}

function exitToMenu() {
  state = 'idle';
  stopBgMusic();
  gameMode = 'key';
  document.getElementById('pauseScreen').classList.add('hidden');
  DOM.endScreen.classList.add('hidden');
  document.getElementById('wordCategoryScreen').classList.add('hidden');
  document.getElementById('modeScreen').classList.remove('hidden');
  if (ctx && canvas) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
}

function endGame() {
  state = 'ended';
  clearHighlight();
  document.getElementById('prompt').textContent = '';
  stopBgMusic();
  showEndScreen();
}

function showEndScreen() {
  const endScreen = document.getElementById('endScreen');
  endScreen.classList.remove('hidden');

  let totalHits = 0, totalAttempts = 0;
  let accuracy = 0;

  if (gameMode === 'word') {
    const completed = wordGameConfig.currentIndex;
    const total = wordGameConfig.words.length;
    accuracy = Math.round((completed / total) * 100);
    totalHits = completed;
    totalAttempts = total;
    const title = document.getElementById('endTitle');
    if (accuracy >= 80) {
      title.textContent = '完美通关 Perfect!';
      title.style.color = '#ffd700';
    } else if (accuracy >= 60) {
      title.textContent = '通关成功 Great!';
      title.style.color = '#53d769';
    } else {
      title.textContent = '继续加油 Keep Going!';
      title.style.color = '#ffa06b';
    }
    document.getElementById('endStats').innerHTML = `
      <div class="stat"><div class="stat-value" style="color:#00d2ff">${score}</div><div class="stat-label">得分 Score</div></div>
      <div class="stat"><div class="stat-value" style="color:#53d769">${completed}/${total}</div><div class="stat-label">单词 Words</div></div>
      <div class="stat"><div class="stat-value" style="color:#ff6b6b">x${maxCombo}</div><div class="stat-label">最大连击 Max</div></div>
    `;
    const medalEl = document.getElementById('medal');
    let medal = '', medalColor = '#888';
    if (accuracy >= 95) { medal = '🥇'; medalColor = '#ffd700'; }
    else if (accuracy >= 85) { medal = '🥈'; medalColor = '#c0c0c0'; }
    else if (accuracy >= 70) { medal = '🥉'; medalColor = '#cd7f32'; }
    else if (accuracy >= 60) { medal = '🏅'; medalColor = '#4ecdc4'; }
    else { medal = '💪'; medalColor = '#ff6b6b'; }
    medalEl.textContent = medal;
    medalEl.style.color = medalColor;
    medalEl.style.display = 'block';
    document.getElementById('fingerBars').innerHTML = '';
    document.getElementById('btnNext').style.display = 'none';
  } else {
    for (const stats of Object.values(fingerStats)) {
      totalHits += stats.hits;
      totalAttempts += stats.hits + stats.misses;
    }
    accuracy = totalAttempts > 0 ? Math.round((totalHits / totalAttempts) * 100) : 0;
    unlockNext(currentLessonIndex, accuracy);
    const title = document.getElementById('endTitle');
    if (accuracy >= 60) {
      title.textContent = '通关成功 Level Complete!';
      title.style.color = '#53d769';
    } else {
      title.textContent = '继续加油 Keep Going!';
      title.style.color = '#ffa06b';
    }
    const btnNext = document.getElementById('btnNext');
    const hasNext = accuracy >= 60 && currentLessonIndex < LESSONS.length - 1;
    btnNext.style.display = hasNext ? 'inline-block' : 'none';
    document.getElementById('endStats').innerHTML = `
      <div class="stat"><div class="stat-value" style="color:#00d2ff">${score}</div><div class="stat-label">得分 Score</div></div>
      <div class="stat"><div class="stat-value" style="color:#53d769">${accuracy}%</div><div class="stat-label">准确率 Accuracy</div></div>
      <div class="stat"><div class="stat-value" style="color:#ff6b6b">x${maxCombo}</div><div class="stat-label">最大连击 Max Combo</div></div>
    `;
    const medalEl = document.getElementById('medal');
    let medal = '', medalColor = '#888';
    if (accuracy >= 95) { medal = '🥇'; medalColor = '#ffd700'; }
    else if (accuracy >= 85) { medal = '🥈'; medalColor = '#c0c0c0'; }
    else if (accuracy >= 70) { medal = '🥉'; medalColor = '#cd7f32'; }
    else if (accuracy >= 60) { medal = '🏅'; medalColor = '#4ecdc4'; }
    else { medal = '💪'; medalColor = '#ff6b6b'; }
    medalEl.textContent = medal;
    medalEl.style.color = medalColor;
    medalEl.style.display = accuracy >= 60 ? 'block' : 'none';
    const barsDiv = document.getElementById('fingerBars');
barsDiv.innerHTML = '';
    const lessonZones = [...new Set(currentLesson().keys.map(k => KEY_MAP[k]?.zone).filter(Boolean))];

    for (const zone of lessonZones) {
      const stats = fingerStats[zone];
      const total = stats.hits + stats.misses;
      const pct = total > 0 ? Math.round((stats.hits / total) * 100) : 0;
      const color = FINGER_ZONES[zone].color;

      const barDiv = document.createElement('div');
      barDiv.className = 'finger-bar';
      barDiv.innerHTML = `
        <div class="finger-bar-fill" style="background:${color}; height:${Math.max(pct, 4)}px;"></div>
        <div class="finger-bar-label" style="color:${color}">${pct}%</div>
      `;
      barsDiv.appendChild(barDiv);
    }
  }
}

function goNextLevel() {
  if (currentLessonIndex < LESSONS.length - 1) {
    currentLessonIndex++;
    startGame();
  }
}

function showMenu() {
  document.getElementById('endScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
  buildLevelSelect();
}

function selectLevel(index) {
  currentLessonIndex = index;
  startGame();
}

function buildLevelSelect() {
  const container = document.getElementById('levelSelect');
  container.innerHTML = '';
  const progress = loadProgress();

  LESSONS.forEach((lesson, i) => {
    const unlocked = i < progress.unlocked;
    const best = progress.bestAccuracy[i];
    const btn = document.createElement('button');
    btn.className = 'btn ' + (unlocked ? 'btn-primary' : '');
    btn.style.cssText = unlocked
      ? 'width:100%; text-align:left; padding:10px 16px; font-size:14px; display:flex; justify-content:space-between; align-items:center;'
      : 'width:100%; text-align:left; padding:10px 16px; font-size:14px; display:flex; justify-content:space-between; align-items:center; background:#333; color:#666; cursor:not-allowed; opacity:0.5;';
    btn.innerHTML = `
      <span><strong>${i + 1}.</strong> ${lesson.name}</span>
      <span style="font-size:12px;">${best != null ? 'Best: ' + best + '%' : (unlocked ? '开始 →' : '🔒')}</span>
    `;
    if (unlocked) btn.onclick = () => selectLevel(i);
    container.appendChild(btn);
  });
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════

window.addEventListener('load', () => {
  initDOM();
  initCanvas();
  buildKeyboard();
  buildLevelSelect();
  lastTime = 0;
  requestAnimationFrame(gameLoop);
});

window.addEventListener('resize', () => {
  initCanvas();
});
</script>
